name: nexus

x-nexus-env: &nexus-env
  ENVIRONMENT: ${ENVIRONMENT:-development}
  DEBUG: ${DEBUG:-true}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  API_BASE_URL: ${API_BASE_URL:-http://localhost:8000}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-dev-openai-key}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  COHERE_API_KEY: ${COHERE_API_KEY:-dev-cohere-key}
  JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-minimum-32-characters}
  ENCRYPTION_KEY_ID: ${ENCRYPTION_KEY_ID:-local}
  WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET:-dev-webhook-secret}
  S3_BUCKET: ${S3_BUCKET:-nexus-raw-dev}
  AWS_REGION: ${AWS_REGION:-us-east-1}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}

services:

  # ── Application Services ──────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.python
    ports:
      - "8000:8000"
    environment:
      <<: *nexus-env
      DATABASE_URL: postgresql+asyncpg://nexus:nexus@postgres:5432/nexus
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKERS: redpanda:29092
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_API_KEY: ${ELASTICSEARCH_API_KEY:-}
    depends_on:
      postgres:    { condition: service_healthy }
      redis:       { condition: service_healthy }
      redpanda:    { condition: service_healthy }
      qdrant:      { condition: service_started }
      elasticsearch: { condition: service_healthy }
    volumes:
      - ./packages:/app/packages
      - ./services:/app/services
    command: uv run uvicorn nexus_api.main:app --host 0.0.0.0 --port 8000 --reload

  ingestion:
    build:
      context: .
      dockerfile: docker/Dockerfile.python
    environment:
      <<: *nexus-env
      DATABASE_URL: postgresql+asyncpg://nexus:nexus@postgres:5432/nexus
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKERS: redpanda:29092
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_API_KEY: ${ELASTICSEARCH_API_KEY:-}
    depends_on:
      postgres:    { condition: service_healthy }
      redis:       { condition: service_healthy }
      redpanda:    { condition: service_healthy }
      qdrant:      { condition: service_started }
      elasticsearch: { condition: service_healthy }
    volumes:
      - ./packages:/app/packages
      - ./services:/app/services
    command: uv run python -m nexus_ingestion.consumer

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.python
    environment:
      <<: *nexus-env
      DATABASE_URL: postgresql+asyncpg://nexus:nexus@postgres:5432/nexus
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKERS: redpanda:29092
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_API_KEY: ${ELASTICSEARCH_API_KEY:-}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:    { condition: service_healthy }
      redis:       { condition: service_healthy }
      qdrant:      { condition: service_started }
      elasticsearch: { condition: service_healthy }
    volumes:
      - ./packages:/app/packages
      - ./services:/app/services
    command: uv run celery -A nexus_worker.celery_app worker --loglevel=info --concurrency=4

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.python
    environment:
      <<: *nexus-env
      DATABASE_URL: postgresql+asyncpg://nexus:nexus@postgres:5432/nexus
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKERS: redpanda:29092
    depends_on:
      postgres:    { condition: service_healthy }
      redis:       { condition: service_healthy }
    volumes:
      - ./packages:/app/packages
      - ./services:/app/services
    command: uv run python -m nexus_scheduler.main

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'"]
      interval: 10s
      timeout: 10s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - 512M
      - --overprovisioned
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"   # Admin API
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true'"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ── Observability (local only) ────────────────────────────────────────────

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./infra/docker/grafana/datasources:/etc/grafana/provisioning/datasources

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  es_data:
  redpanda_data:
  grafana_data:
  prometheus_data:
