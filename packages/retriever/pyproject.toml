[project]
name = "nexus-retriever"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "anthropic>=0.34",
    "cohere>=5.6",
    "elasticsearch[async]>=8.13",
    "nexus-core",
    "openai>=1.35",
    "qdrant-client>=1.9",
    "redis[hiredis]>=5.0",
]

[tool.uv.sources]
nexus-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["nexus_retriever"]
